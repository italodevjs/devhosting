<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- ── Primary SEO ── -->
    <title>DevHosting — Hospedagem de Elite, VPS e Domínios com Segurança Google</title>
    <meta name="description" content="Hospedagem de sites, VPS e domínios com segurança de nível Google. SSL grátis, CDN global, backup diário, suporte 24/7 via IA. Aceite pagamentos em Pix, Cripto e Cartão." />
    <meta name="keywords" content="hospedagem de sites, VPS, domínios, SSL grátis, CDN, cPanel, hospedagem brasil, devhosting, segurança cibernética, pix hospedagem" />
    <meta name="author" content="DevHosting" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://devhosting.vercel.app/" />

    <!-- ── Theme & PWA ── -->
    <meta name="theme-color" content="#0d0d0d" />
    <meta name="color-scheme" content="dark" />
    <meta name="application-name" content="DevHosting" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DevHosting" />

    <!-- ── Open Graph / Facebook ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://devhosting.vercel.app/" />
    <meta property="og:title" content="DevHosting — Hospedagem de Elite, VPS e Domínios" />
    <meta property="og:description" content="Infraestrutura dedicada com segurança de nível Google. SSL grátis, CDN global, backup diário e suporte 24/7 via IA. Pix, Cripto e Cartão." />
    <meta property="og:image" content="https://devhosting.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="DevHosting — Hospedagem de Elite" />
    <meta property="og:site_name" content="DevHosting" />
    <meta property="og:locale" content="pt_BR" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://devhosting.vercel.app/" />
    <meta name="twitter:title" content="DevHosting — Hospedagem de Elite, VPS e Domínios" />
    <meta name="twitter:description" content="Infraestrutura dedicada com segurança de nível Google. SSL grátis, CDN global, backup diário e suporte 24/7 via IA." />
    <meta name="twitter:image" content="https://devhosting.vercel.app/og-image.png" />

    <!-- ── Structured Data (JSON-LD) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DevHosting",
      "url": "https://devhosting.vercel.app",
      "logo": "https://devhosting.vercel.app/logo.png",
      "description": "Hospedagem de sites, VPS e domínios com segurança de nível Google.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": ["Portuguese", "English", "Spanish"],
        "email": "suporte@devhosting.com.br"
      },
      "sameAs": [
        "https://github.com/italodevjs/devhosting"
      ],
      "offers": [
        {
          "@type": "Offer",
          "name": "Hospedagem Starter",
          "price": "19.90",
          "priceCurrency": "BRL",
          "description": "Hospedagem para 1 site com 10 GB SSD NVMe, SSL grátis e suporte via IA"
        },
        {
          "@type": "Offer",
          "name": "Hospedagem Pro",
          "price": "49.90",
          "priceCurrency": "BRL",
          "description": "Sites ilimitados, 50 GB SSD NVMe, SSL Wildcard, CDN global e backup diário"
        },
        {
          "@type": "Offer",
          "name": "Hospedagem Business",
          "price": "99.90",
          "priceCurrency": "BRL",
          "description": "Sites ilimitados, 200 GB SSD NVMe, IP dedicado, WAF e suporte prioritário"
        }
      ]
    }
    </script>

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
